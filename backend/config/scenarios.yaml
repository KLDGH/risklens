# ===========================================================================
# RiskLens — Stress-Test Configuration
# ===========================================================================
# This file holds the *assumptions* behind the scenario analysis. The risk
# engine (backend/risk_engine.py) only knows how to APPLY these; what to apply
# lives here, so an analyst / PM can review or revise the stress assumptions
# without touching Python.
#
# It is validated on load by backend/scenario_config.py — a malformed edit
# (bad ticker/category, non-numeric shock, missing id, duplicate id) fails the
# regen loudly instead of silently producing wrong P&L. A per-portfolio
# coverage report is printed at regen time.
#
# Three sections:
#   historical:    crisis windows replayed from real price history (dates)
#   hypothetical:  forward-looking analyst shocks, expressed by CATEGORY
#   proxies:       long-history stand-ins for funds that post-date a crisis
#
# Hypothetical shocks are keyed by the security taxonomy in categories.yaml
# (asset-class/region `class` + optional equity `sector`), not by ticker. Each
# holding's effective shock resolves: per-name override -> sector -> class ->
# class-parent. So "em: -0.22" and "semis: -0.35" each stated once flow through
# every matching holding, including the look-through baskets.
# ===========================================================================


# ---------------------------------------------------------------------------
# Historical scenarios — real crisis windows. The engine computes each
# portfolio's actual total return over [start, end] from price history.
# ---------------------------------------------------------------------------
historical:
  - id: gfc
    name: Global Financial Crisis
    desc: Lehman Brothers collapse triggers global credit freeze
    start: "2008-09-15"
    end: "2009-03-09"

  - id: covid
    name: COVID Crash
    desc: Pandemic panic selling, fastest 30% drop in S&P history
    start: "2020-02-20"
    end: "2020-03-23"

  - id: rate_shock_2022
    name: Fed Rate Shock 2022
    desc: Most aggressive hiking cycle in 40 years breaks stocks AND bonds
    start: "2022-01-03"
    end: "2022-10-12"

  - id: russia_ukraine
    name: Russia–Ukraine Invasion
    desc: Full-scale invasion triggers energy shock and risk-off selloff
    start: "2022-02-24"
    end: "2022-03-14"

  - id: q4_2018
    name: Q4 2018 Sell-off
    desc: Fed tightening fears and trade war escalation hit markets
    start: "2018-10-03"
    end: "2018-12-24"


# ---------------------------------------------------------------------------
# Hypothetical / forward-looking scenarios.
# `categories:` shocks are analyst-estimated % moves (-0.22 = a 22% drop)
# applied per-category. An optional `shocks:` block (ticker -> %) overrides a
# specific name. These are illustrative assumptions, not forecasts.
# ---------------------------------------------------------------------------
hypothetical:
  - id: taiwan_invasion
    name: Taiwan Invasion
    desc: PLA military action triggers semiconductor supply shock and broad Asia risk-off
    categories:
      # equities by region
      us_large:        -0.15
      us_mid:          -0.15
      us_small:        -0.14
      dev_intl:        -0.13
      em:              -0.22   # heavy Asia exposure
      global_eq:       -0.18
      real_estate:     -0.10
      # sector overlays (win over region for tagged holdings)
      semis:           -0.28   # epicenter — supply shock
      tech:            -0.20
      # fixed income — flight to safety
      treasuries:      +0.05
      long_treasuries: +0.09
      us_agg:          +0.04
      ig_credit:       +0.02
      hy_credit:       -0.09   # spreads widen
      intl_bond:       +0.03
      tips:            +0.04
      # real assets / crypto
      gold:            +0.14
      commodity:       +0.08   # oil/metals supply shock
      crypto:          -0.28

  - id: iran_conflict
    name: Iran Conflict / Oil Shock
    desc: Strait of Hormuz disruption drives oil toward $150, stagflation fears spike
    categories:
      us_large:        -0.09
      us_mid:          -0.09
      us_small:        -0.09
      dev_intl:        -0.10   # Europe/Japan oil importers
      em:              -0.13
      global_eq:       -0.10
      real_estate:     -0.07
      energy:          +0.12   # oil producers benefit
      semis:           -0.08
      tech:            -0.08
      treasuries:      +0.02
      long_treasuries: +0.04
      us_agg:          +0.02
      ig_credit:       +0.01
      hy_credit:       -0.07
      intl_bond:       +0.01
      tips:            +0.05   # inflation hedge
      gold:            +0.13
      commodity:       +0.18   # oil-heavy index, biggest beneficiary
      crypto:          -0.18

  - id: us_recession
    name: U.S. Recession
    desc: GDP contraction triggers Fed pivot, credit spreads widen, earnings fall
    categories:
      us_large:        -0.28
      us_mid:          -0.30
      us_small:        -0.32   # small caps hit hardest
      dev_intl:        -0.22
      em:              -0.22
      global_eq:       -0.25
      real_estate:     -0.22
      # cyclicals crater, defensives hold up — the sector dispersion a
      # per-ticker table made impractical to express
      semis:           -0.34
      tech:            -0.32
      financials:      -0.32   # credit cycle
      consumer_disc:   -0.32
      industrials:     -0.28
      materials:       -0.24
      communications:  -0.24
      energy:          -0.20   # demand collapse
      healthcare:      -0.14   # defensive
      consumer_staples: -0.12  # defensive
      utilities:       -0.10   # defensive
      # fixed income — Fed pivot
      treasuries:      +0.10
      long_treasuries: +0.18
      us_agg:          +0.08
      ig_credit:       +0.04
      hy_credit:       -0.16   # high-yield blowout
      intl_bond:       +0.05
      tips:            +0.06
      gold:            +0.08
      commodity:       -0.18   # demand collapse
      crypto:          -0.45

  - id: ai_bubble_burst
    name: AI Bubble Burst
    desc: Demand disappointment or capex reality check causes mega-cap tech repricing
    categories:
      us_large:        -0.18
      us_mid:          -0.15
      us_small:        -0.12
      dev_intl:        -0.10   # less mega-cap AI concentration
      em:              -0.10
      global_eq:       -0.20
      real_estate:     -0.08
      # AI epicenter
      semis:           -0.35
      tech:            -0.32
      communications:  -0.15
      # rest of equity market far milder — defensives barely move
      financials:      -0.10
      healthcare:      -0.09
      energy:          -0.06
      consumer_staples: -0.08
      utilities:       -0.06
      # fixed income — modest flight to quality
      treasuries:      +0.05
      long_treasuries: +0.08
      us_agg:          +0.04
      ig_credit:       +0.02
      hy_credit:       -0.08
      intl_bond:       +0.02
      tips:            +0.03
      gold:            +0.05
      commodity:       -0.05
      crypto:          -0.30


# ---------------------------------------------------------------------------
# Long-history proxies for newer ETFs/funds, used ONLY in historical
# scenario windows that pre-date a fund's inception (e.g. the iShares Core
# sleeve in AOR launched 2012-2017, so the 2008 GFC window has no native
# data). Each proxy is a near-identical-exposure fund with data back to the
# crisis. The substitution is disclosed via each scenario's "proxied" map.
#   format:  <ticker without history>: <stand-in ticker with history>
# ---------------------------------------------------------------------------
proxies:
  IUSB: AGG    # iShares Core US Total Bond  ← iShares Core US Aggregate Bond
  IDEV: EFA    # iShares Core MSCI Intl Dev  ← iShares MSCI EAFE
  IEMG: EEM    # iShares Core MSCI EM        ← iShares MSCI Emerging Markets
  IAGG: AGG    # iShares Core Intl Agg Bond  ← US Aggregate (domestic stand-in)
  VXUS: EFA    # Vanguard Total Intl Stock   ← MSCI EAFE (developed-heavy proxy)
  BNDX: AGG    # Vanguard Total Intl Bond    ← US Aggregate (domestic stand-in)
  # American Funds 2035 (AAFTX) newer underlyings — proxy the post-inception
  # funds into the GFC-2008 / Q4-2018 windows with a same-exposure American
  # Fund or ETF that has crisis-era history. Substitution is disclosed.
  AGVFX: ANWPX   # Global Insight (2019)        ← New Perspective (global equity)
  GBLAX: ABALX   # Global Balanced (2011)       ← American Balanced (balanced)
  MFAAX: AGG     # American Funds Mortgage (2010) ← US Aggregate (MBS-heavy)
  BFIAX: TIP     # Inflation Linked Bond (2012) ← TIPS ETF
  EBNAX: HYG     # EM Bond (2016)               ← high-yield credit (risk-on bond)
  MIAYX: HYG     # Multi-Sector Income (2019)   ← high-yield credit (credit-sensitive)
  ANBAX: AGG     # Strategic Bond (2016)        ← US Aggregate (core-plus IG)
