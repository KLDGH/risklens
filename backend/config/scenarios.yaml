# ===========================================================================
# RiskLens — Stress-Test Configuration
# ===========================================================================
# This file holds the *assumptions* behind the scenario analysis. The risk
# engine (backend/risk_engine.py) only knows how to APPLY these; what to apply
# lives here, so an analyst / PM can review or revise the stress assumptions
# without touching Python.
#
# It is validated on load by backend/scenario_config.py — a malformed edit
# (bad ticker, non-numeric shock, missing id, duplicate id) fails the regen
# loudly instead of silently producing wrong P&L. A per-portfolio coverage
# report is printed at regen time so you can see if a scenario under-covers a
# portfolio after an edit.
#
# Three sections:
#   historical:    crisis windows replayed from real price history (dates)
#   hypothetical:  forward-looking analyst shock vectors (% move per ticker)
#   proxies:       long-history stand-ins for funds that post-date a crisis
# ===========================================================================


# ---------------------------------------------------------------------------
# Historical scenarios — real crisis windows. The engine computes each
# portfolio's actual total return over [start, end] from price history.
# ---------------------------------------------------------------------------
historical:
  - id: gfc
    name: Global Financial Crisis
    desc: Lehman Brothers collapse triggers global credit freeze
    start: "2008-09-15"
    end: "2009-03-09"

  - id: covid
    name: COVID Crash
    desc: Pandemic panic selling, fastest 30% drop in S&P history
    start: "2020-02-20"
    end: "2020-03-23"

  - id: rate_shock_2022
    name: Fed Rate Shock 2022
    desc: Most aggressive hiking cycle in 40 years breaks stocks AND bonds
    start: "2022-01-03"
    end: "2022-10-12"

  - id: russia_ukraine
    name: Russia–Ukraine Invasion
    desc: Full-scale invasion triggers energy shock and risk-off selloff
    start: "2022-02-24"
    end: "2022-03-14"

  - id: q4_2018
    name: Q4 2018 Sell-off
    desc: Fed tightening fears and trade war escalation hit markets
    start: "2018-10-03"
    end: "2018-12-24"


# ---------------------------------------------------------------------------
