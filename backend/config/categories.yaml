# ===========================================================================
# RiskLens — Security Taxonomy (for category-based scenario shocks)
# ===========================================================================
# This map lets the scenario configurator (scenarios.yaml) express stress
# assumptions at the level of an asset class / region / sector instead of one
# number per ticker. A security's effective shock under a scenario resolves as:
#
#     1. per-name override   (scenarios.yaml -> scenario.shocks[ticker])
#     2. its `sector`        (if the scenario shocks that equity sector)
#     3. its `class`         (asset-class/region leaf)
#     4. the class's parent  (walk up `class_parents` until a shocked node)
#     5. otherwise uncovered (excluded; basket re-normalizes)
#
# So an analyst shocks "em -0.22" and "semis -0.35" once, and every EM holding
# / every semi flows through automatically — including the look-through baskets.
#
# Two axes on purpose: the macro scenarios care about BOTH region (EM vs US
# equity move differently) and sector (semis vs broad equity in an AI shock).
# `class` is the region/asset-class axis (a small tree); `sector` is an optional
# equity overlay that, when a scenario shocks it, wins over the region class.
#
# Validated on load by scenario_config.py: every `class` must resolve to a root
# via class_parents, every `sector` must be in `sectors`, weight-vectors must
# sum to ~1, and every portfolio holding must appear in `securities`.
# ===========================================================================


# Class tree: leaf/intermediate -> parent. Walking up must terminate at a root
# (a class that is itself a key here mapping to a root, or a declared root).
# Roots: equity, bond, real_asset, crypto, cash.
class_parents:
  # equities (region) roll up to `equity`
  us_large:        equity
  us_mid:          equity
  us_small:        equity
  dev_intl:        equity
  em:              equity
  global_eq:       equity
  real_estate:     equity      # REITs trade equity-like in these scenarios
  # fixed income rolls up to `bond`
  treasuries:      bond
  long_treasuries: bond
  us_agg:          bond
  ig_credit:       bond
  hy_credit:       bond
  intl_bond:       bond
  tips:            bond
  # real assets
  commodity:       real_asset
  gold:            real_asset
  # roots (map to themselves so the walk-up terminates cleanly)
  equity:          equity
  bond:            bond
  real_asset:      real_asset
  crypto:          crypto
  cash:            cash


# Valid equity-sector overlays. A scenario may shock any of these; a security
# tagged with one gets the sector shock in preference to its region class.
sectors:
  - semis
  - tech            # software / internet / platforms (ex-semis)
  - communications
  - financials
  - healthcare
  - industrials
  - energy
  - materials
  - consumer_disc
  - consumer_staples
  - utilities


# Security -> taxonomy. Forms:
#   TICKER: {class: <leaf>}                      pure asset-class/region
#   TICKER: {class: <leaf>, sector: <sector>}    equity with a sector overlay
#   TICKER: {weights: {<class>: w, ...}}         blended fund (weights sum ~1)
securities:

  # ── Broad / asset-class ETFs ───────────────────────────────────────────
