  DWLD: Davis Select Worldwide ETF
  # Common index ETFs — used by the benchmarks above, and listed here so they
  # can also be dropped straight into a portfolio's holdings without an error.
  ACWI: MSCI ACWI (Global Equity) ETF
  AGG: iShares Core US Aggregate Bond ETF


# Named policy benchmarks. Each portfolio references one by key; it renders as a
# muted row under the total, computed through the same engine.
benchmarks:
  60_40_acwi_agg:
    label: "Policy benchmark · 60/40 (ACWI / AGG)"
    weights: {ACWI: 0.60, AGG: 0.40}
  90_10_acwi_agg:
    label: "Policy benchmark · 90/10 (ACWI / AGG)"
    weights: {ACWI: 0.90, AGG: 0.10}
  65_35_acwi_agg:
    label: "Policy benchmark · 65/35 (ACWI / AGG)"
    weights: {ACWI: 0.65, AGG: 0.35}
  acwi_global:
    label: "Benchmark · MSCI ACWI (global equity)"
    weights: {ACWI: 1.00}


