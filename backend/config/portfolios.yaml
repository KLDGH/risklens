# ===========================================================================
# RiskLens — Portfolio Registry
# ===========================================================================
# The set of portfolios the app shows, and how each is defined. Edit this file
# to add / hide / reorder portfolios without touching Python. Loaded + validated
# by backend/portfolio_config.py, which builds the pipeline's PORTFOLIO_MODES
# and BENCHMARKS from it.
#
# A portfolio's HOLDINGS come from one of two sources:
#   holdings: {weights: {TICKER: w, ...}}        an explicit basket (sums ~1)
#   holdings: {look_through: {fund_ticker, top_n}} a fund's disclosed top-N,
#       read from the committed holdings file (active_fund_holdings.json, itself
#       exported from the sponsor's PDF — there is no reliable free holdings API
#       for active ETFs / mutual funds, so that export stays a manual step).
#
# A ticker gets you the PRICE side for free: `nav_ticker` shows the real fund
# share price on the total row; `fund_ticker` adds the fund's own reference row.
# `benchmark` references a named policy blend below. `visible: false` hides a
# portfolio's tab. List order here is display order.
#
# ---------------------------------------------------------------------------
# HOW TO ADD A PORTFOLIO
#   1. Add an entry under `portfolios:` with a unique `id`, `label`, `name`,
#      `description`, a `benchmark:` (one of the keys under `benchmarks:`), and
#      `holdings: {weights: {TICKER: w, ...}}`. Weights must sum to ~1.0.
#   2. Every ticker must (a) appear in `names:` below and (b) be classified in
#      categories.yaml. Miss either and the regen STOPS and prints the exact
#      ticker to add — nothing breaks silently, so it's safe to try.
#   3. `visible: false` hides a tab; the order of this list is the tab order.
#   Common edits — hide/reorder a portfolio, retune a benchmark — are just this
#   file. Adding a brand-new active FUND (holdings: {look_through: ...}) is the
#   exception: its basket is read from active_fund_holdings.json (exported from
#   the sponsor's PDF), so that needs the export step, not just YAML.
# ===========================================================================


# Ticker -> display name, used to label per-asset rows. Look-through holding
# names come from the disclosure file, so only the fund tickers need listing.
names:
